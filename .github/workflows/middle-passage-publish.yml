name: publish middle-passage

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type publish-middle-passage to publish to PyPI"
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'release' || github.event.inputs.confirm == 'publish-middle-passage'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/middle-passage
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: middle-passage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build pytest
      - name: Test
        run: python -m pytest -q
      - name: Build
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: middle-passage/dist/
