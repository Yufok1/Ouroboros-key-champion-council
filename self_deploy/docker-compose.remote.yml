services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: champion-council-proxy-remote
    ports:
      - "7866:7866"
    volumes:
      - ./data:/app/data
      # - ./config/.env:/app/config/.env:ro
    environment:
      APP_ENV: production
      APP_PORT: 7866
      MANAGE_LOCAL_CAPSULE: "0"
      # Set this to your remote capsule MCP endpoint
      MCP_BASE_URL: ${MCP_BASE_URL:-http://host.docker.internal:8766}
      PERSISTENCE_MODE: ${PERSISTENCE_MODE:-local}
      DATA_DIR: /app/data
      HF_TOKEN: ${HF_TOKEN:-}
      SPACE_AUTHOR_NAME: ${SPACE_AUTHOR_NAME:-}
      SPACE_ID: ${SPACE_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7866/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
