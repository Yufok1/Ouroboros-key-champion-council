services:
  champion-council:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: champion-council-self-deploy
    ports:
      - "7866:7866"
      # Optional direct capsule access (normally clients use /mcp/sse via 7866)
      - "8766:8766"
    volumes:
      - ./data:/app/data
      - ./capsule:/app/capsule
      # Optional local env override file
      # - ./config/.env:/app/config/.env:ro
    environment:
      APP_ENV: production
      APP_PORT: 7866
      MCP_PORT: 8766
      MANAGE_LOCAL_CAPSULE: "1"
      PERSISTENCE_MODE: local
      DATA_DIR: /app/data
      CAPSULE_PATH: /app/capsule/champion_gen8.py
      CAPSULE_GZ_PATH: /app/capsule/capsule.gz
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7866/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
